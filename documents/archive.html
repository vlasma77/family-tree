    body { font-family: 'Georgia', serif; background-color: #d6d3d1; color: #1c1917; padding: 30px; margin: 0; }

    h1 { font-family: sans-serif; text-align: center; color: #292524; margin-bottom: 20px; border-bottom: 1px solid #a8a29e; padding-bottom: 15px; }
    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; margin-top: 25px; }
    .doc-card { background: #f5f5f4; border: 1px solid #a8a29e; padding: 12px; border-radius: 4px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; display: flex; flex-direction: column; justify-content: space-between; }
    .doc-card img, .doc-card video { width: 100%; height: 180px; object-fit: contain; background: #eaeaea; transition: transform 0.2s; }
    .doc-card img { cursor: pointer; }
    .doc-card img:hover { transform: scale(1.03); }
    .pdf-box { width: 100%; height: 180px; background: #fca5a5; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px dashed #ef4444; text-decoration: none; color: #991b1b; font-weight: bold; font-family: sans-serif; transition: background 0.2s; }
    .pdf-box:hover { background: #fca5a5ee; }
    .pdf-icon { font-size: 48px; margin-bottom: 5px; }
    .doc-title { font-size: 13px; margin-top: 10px; color: #1c1917; font-weight: 500; line-height: 1.3; min-height: 34px; display: flex; align-items: center; justify-content: center; }
    .back-btn { display: inline-block; padding: 8px 15px; background: #451a03; color: white; text-decoration: none; border-radius: 4px; font-size: 14px; margin-bottom: 20px; font-family: sans-serif; }
    .back-btn:hover { background: #78350f; }
  </style>

  // Очищаем строку параметров от любых невидимых символов
  const urlParams = new URLSearchParams(window.location.search);
  let personId = urlParams.get('id');
  if (personId) {
    personId = personId.trim().replace(/[\u200B-\u200D\uFEFF]/g, "");
  }

  // Принудительное выпрямление ID для Анатолия, если дерево передает его криво
  if (!personId || personId.includes("anatoly")) {
    personId = "person_anatoly_1937";
  }

  const archive = archivesData[personId];
  if (archive) {
    document.getElementById("archive-title").innerText = archive.title;
    const container = document.getElementById("gallery-container");
    
    archive.files.forEach(item => {
      const card = document.createElement("div");
      card.className = "doc-card";
      
      // Находим имя файла, независимо от того, записано оно как item.src или item.file
      const fileName = item.src || item.file;
      
      if (!fileName) return; // Если имени файла нет, пропускаем шаг

      // Собираем правильный путь к папке
      let folderName = personId ? personId : "person_anatoly_1937";
      let filePath = folderName + "/" + fileName;
      
      const fileSrcLower = fileName.toLowerCase();
      const isVideo = fileSrcLower.endsWith('.mp4');
      const isPdf = fileSrcLower.endsWith('.pdf');
      
      // Находим текст подписи, также страхуясь от разных форматов структуры данных
      const captionText = (item.caption && typeof item.caption === 'object') 
        ? (item.caption.ru || item.caption.en || "") 
        : (item.caption || "");

      if (isVideo) {
        card.innerHTML = `
          <video controls>
            <source src="${filePath}" type="video/mp4">
            Ваш браузер не поддерживает видео.
          </video>
          <div class="doc-title">${captionText}</div>
        `;
      } else if (isPdf) {
        card.innerHTML = `
          <a href="${filePath}" target="_blank" class="pdf-box">
            <span class="pdf-icon">📄</span>
            <span>Открыть PDF</span>
          </a>
          <div class="doc-title">${captionText}</div>
        `;
      } else {
        card.innerHTML = `
          <a href="${filePath}" target="_blank">
            <img src="${filePath}" alt="Документ" onerror="this.onerror=null; this.src='../photos/male.jpg';">
          </a>
          <div class="doc-title">${captionText}</div>
        `;
      }
      container.appendChild(card);
    });
  } else {
    document.getElementById("archive-title").innerText = "Архив не найден или пуст";
  }
