  <style>
    body {
      font-family: 'Georgia', serif;
      background-color: #d6d3d1;
      color: #1c1917;
      padding: 30px;
      margin: 0;
    }
    .archive-container {
      max-width: 1100px;
      margin: 0 auto;
      background-color: #e8dcbf;
      border: 2px solid #856f49;
      border-radius: 8px;
      padding: 30px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }
    h1 {
      font-family: sans-serif;
      font-size: 24px;
      color: #292524;
      border-bottom: 1px solid #a8a29e;
      padding-bottom: 10px;
      margin-bottom: 25px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }
    .doc-card {
      background: #f5f5f4;
      border: 1px solid #a8a29e;
      padding: 12px;
      border-radius: 4px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .img-wrapper {
      width: 100%;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e7e5e4;
      overflow: hidden;
      border: 1px solid #d6d3d1;
      cursor: pointer;
      position: relative;
    }
    .img-wrapper img, .img-wrapper video {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      transition: transform 0.2s;
    }
    .img-wrapper img:hover {
      transform: scale(1.03);
    }
    .doc-title {
      font-size: 13px;
      margin-top: 10px;
      font-weight: bold;
      color: #444;
      word-break: break-word;
    }
    .no-docs {
      grid-column: 1 / -1;
      text-align: center;
      font-style: italic;
      color: #78716c;
      padding: 40px;
    }
    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      color: #7c2d12;
      text-decoration: none;
      font-size: 14px;
      font-weight: bold;
    }
    .back-link:hover { text-decoration: underline; }

    /* Модальное окно */
    .lightbox {
      display: none;
      position: fixed;
      z-index: 9999;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      align-items: center;
      justify-content: center;
    }
    .lightbox.active { display: flex; }
    .lightbox img, .lightbox video { max-width: 90%; max-height: 90%; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    .lightbox-close {
      position: absolute;
      top: 20px; right: 30px;
      color: white; font-size: 40px;
      cursor: pointer; user-select: none;
    }
    .badge {
      position: absolute;
      top: 5px;
      right: 5px;
      color: white;
      padding: 2px 6px;
      font-size: 11px;
      border-radius: 3px;
      font-family: sans-serif;
      font-weight: bold;
    }
    .badge-video { background: rgba(124, 45, 18, 0.9); }
    .badge-pdf { background: rgba(185, 28, 28, 0.9); }
    .pdf-icon { font-size: 55px; color: #b91c1c; }
  </style>
</head>

    "person_blyuma_1895": "Блюмы Самуиловны Смагаринской",
    "person_efim_1919": "Ефима Вульфовича Смагаринского"
  };

  function getQueryParam(param) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(param);
  }

  function initArchive() {
    const id = getQueryParam("id");
    const grid = document.getElementById("archive-grid");
    const header = document.getElementById("archive-header");

    if (id && namesMapping[id]) {
      header.innerText = `Архивные документы и фото — ${namesMapping[id]}`;
    }

    if (!id || !archivesDb[id] || archivesDb[id].length === 0) {
      grid.innerHTML = `<div class="no-docs">Для данной персоны архивные документы пока не добавлены.</div>`;
      return;
    }

    grid.innerHTML = "";

    archivesDb[id].forEach(item => {
      const card = document.createElement("div");
      card.className = "doc-card";
      const fullPath = `${item.file}`;
      
      const lowerPath = fullPath.toLowerCase();
      const isVideo = lowerPath.endsWith('.mp4');
      const isPdf = lowerPath.endsWith('.pdf');

      let mediaHtml = "";
      if (isVideo) {
        mediaHtml = `
          <div class="img-wrapper" onclick="openLightbox('${fullPath}', 'video')">
            <span class="badge badge-video">ВИДЕО 🎬</span>
            <video src="${fullPath}" muted preload="metadata"></video>
          </div>
        `;
      } else if (isPdf) {
        mediaHtml = `
          <a class="img-wrapper" href="${fullPath}" target="_blank" style="text-decoration:none;">
            <span class="badge badge-pdf">PDF 📄</span>
            <div class="pdf-icon">📕</div>
          </a>
        `;
      } else {
        mediaHtml = `
          <div class="img-wrapper" onclick="openLightbox('${fullPath}', 'img')">
            <img src="${fullPath}" alt="${item.title}">
          </div>
        `;
      }

      card.innerHTML = `
        ${mediaHtml}
        <div class="doc-title">${item.title}</div>
      `;
      grid.appendChild(card);
    });
  }

  function openLightbox(src, type) {
    const container = document.getElementById("lightbox-content");
    container.innerHTML = "";

    if (type === 'video') {
      container.innerHTML = `<video src="${src}" controls autoplay style="max-width:90%; max-height:90%;"></video>`;
    } else {
      container.innerHTML = `<img src="${src}" alt="Крупный план">`;
    }

    document.getElementById("lightbox").classList.add("active");
  }

  function closeLightbox() {
    document.getElementById("lightbox-content").innerHTML = ""; 
    document.getElementById("lightbox").classList.remove("active");
  }

  window.onload = initArchive;
</script>
