<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Исторический Архив Документов</title>
  <style>
    body {
      font-family: 'Georgia', serif;
      background-color: #d6d3d1;
      color: #1c1917;
      padding: 30px;
      margin: 0;
    }
    .archive-container {
      max-width: 1100px;
      margin: 0 auto;
      background-color: #e8dcbf;
      border: 2px solid #856f49;
      border-radius: 8px;
      padding: 30px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }
    h1 {
      font-family: sans-serif;
      font-size: 24px;
      color: #292524;
      border-bottom: 1px solid #a8a29e;
      padding-bottom: 10px;
      margin-bottom: 25px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }
    .doc-card {
      background: #f5f5f4;
      border: 1px solid #a8a29e;
      padding: 12px;
      border-radius: 4px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .img-wrapper {
      width: 100%;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e7e5e4;
      overflow: hidden;
      border: 1px solid #d6d3d1;
      cursor: pointer;
    }
    .img-wrapper img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      transition: transform 0.2s;
    }
    .img-wrapper img:hover {
      transform: scale(1.03);
    }
    .doc-title {
      font-size: 13px;
      margin-top: 10px;
      font-weight: bold;
      color: #444;
      word-break: break-word;
    }
    .no-docs {
      grid-column: 1 / -1;
      text-align: center;
      font-style: italic;
      color: #78716c;
      padding: 40px;
    }
    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      color: #7c2d12;
      text-decoration: none;
      font-size: 14px;
      font-weight: bold;
    }
    .back-link:hover { text-decoration: underline; }

    /* Модальное окно */
    .lightbox {
      display: none;
      position: fixed;
      z-index: 9999;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      align-items: center;
      justify-content: center;
    }
    .lightbox.active { display: flex; }
    .lightbox img { max-width: 90%; max-height: 90%; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    .lightbox-close {
      position: absolute;
      top: 20px; right: 30px;
      color: white; font-size: 40px;
      cursor: pointer; user-select: none;
    }
  </style>
</head>
<body>

<div class="archive-container">
  <a href="../index.html" class="back-link">← Вернуться к Семейному Дереву</a>
  <h1 id="archive-header">Архивные документы</h1>
  
  <div class="grid" id="archive-grid"></div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">&times;</span>
  <img id="lightbox-img" src="" alt="Крупный план" onclick="event.stopPropagation()">
</div>

<script>
  const archivesDb = {
    "person_mikhail_1922": [
      { file: "person_mikhail_1922/birth_certificate.jpg", title: "Свидетельство о рождении" },
      { file: "person_mikhail_1922/vladimir_anatoly_mikhail.jpg", title: "Владимир, Анатолий и Михаил" },
      { file: "person_mikhail_1922/mikhail_soldier.jpg", title: "Михаил в молодости (военные годы)" },
      { file: "person_mikhail_1922/mikhail_vera.jpg", title: "Михаил и Вера" },
      { file: "person_mikhail_1922/family_gathering.jpg", title: "Семейная встреча" }
    ],
    "person_anatoly_1937": [
      { file: "person_anatoly_1937/anatoly_young.jpg", title: "Анатолий в молодости" },
      { file: "person_anatoly_1937/anatoly_khabarovsk.jpg", title: "Анатолий в Хабаровске" },
      { file: "person_anatoly_1937/family_photo.jpg", title: "Анатолий с семьей" }
    ],
    "person_katya_1924": [
      { file: "person_katya_1924/katya_portrait.jpg", title: "Портрет Кати Смагаринской" },
      { file: "person_katya_1924/katya_document.jpg", title: "Архивный документ Кати" }
    ],
    "person_sonya_1929": [
      { file: "person_sonya_1929/sonya1929.jpg", title: "Портрет Сони Смагаринской" },
      { file: "person_sonya_1929/sonya_middle.png", title: "Соня в центре фото" },
      { file: "person_sonya_1929/with_parents.jpg", title: "Соня с родителями" },
      { file: "person_sonya_1929/sonya_mikhail.jpg", title: "Соня с супругом Михаилом" },
      { file: "person_sonya_1929/sonya_sister_mira.jpg", title: "Соня с сестрой Мирой" },
      { file: "person_sonya_1929/sonya_mira_blyuma.jpg", title: "Соня, Мира и Блюма" },
      { file: "person_sonya_1929/katya_sonya_mira.jpg", title: "Катя, Соня и Мира" },
      { file: "person_sonya_1929/meeting_with_sisters.jpg", title: "Встреча с сестрами" },
      { file: "person_sonya_1929/sons_sonya.jpg", title: "Сыновья Леонид и Игорь" },
      { file: "person_sonya_1929/sons_leonid_igor.jpg", title: "Соня с сыновьями" },
      { file: "person_sonya_1929/photo_session_elatives.jpg", title: "Фотосессия с родственниками" },
      { file: "person_sonya_1929/sonya_with_relatives.jpg", title: "Соня в кругу близких" },
      { file: "person_sonya_1929/grave_sonya.png", title: "Место упокоения Сони" }
    ],
    "person_vulf_1898": [
      { file: "person_vulf_1898/vulf_shoe_master.jpg", title: "Вульф за работой в артели" }
    ],
    "person_blyuma_1895": [
      { file: "person_blyuma_1895/blyuma_old.jpg", title: "Блюма Самуилова (архивное фото)" }
    ],
    "person_efim_1919": [
      { file: "person_efim_1919/efim_war.jpg", title: "Ефим Смагаринский в военные годы" }
    ]
  };

  const namesMapping = {
    "person_mikhail_1922": "Михаила Вульфовича Смагаринского",
    "person_anatoly_1937": "Анатолия Вульфовича Смагаринского",
    "person_katya_1924": "Кати Вульфовны Смагаринской",
    "person_sonya_1929": "Сони Вульфовны Смагаринской",
    "person_vulf_1898": "Вульфа Шевелевича Смагаринского",
    "person_blyuma_1895": "Блюмы Самуиловны Смагаринской",
    "person_efim_1919": "Ефима Вульфовича Смагаринского"
  };

  function getQueryParam(param) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(param);
  }

  function initArchive() {
    const id = getQueryParam("id");
    const grid = document.getElementById("archive-grid");
    const header = document.getElementById("archive-header");

    if (id && namesMapping[id]) {
      header.innerText = `Архивные документы и фото — ${namesMapping[id]}`;
    }

    if (!id || !archivesDb[id] || archivesDb[id].length === 0) {
      grid.innerHTML = `<div class="no-docs">Для данной персоны архивные документы пока не добавлены или путей не найдено.</div>`;
      return;
    }

    archivesDb[id].forEach(item => {
      const card = document.createElement("div");
      card.className = "doc-card";

      card.innerHTML = `
        <div class="img-wrapper" onclick="openLightbox('${item.file}')">
          <img src="${item.file}" alt="${item.title}" onerror="this.src='../photos/male.jpg';">
        </div>
        <div class="doc-title">${item.title}</div>
      `;
      grid.appendChild(card);
    });
  }

  function openLightbox(src) {
    document.getElementById("lightbox-img").src = src;
    document.getElementById("lightbox").classList.add("active");
  }

  function closeLightbox() {
    document.getElementById("lightbox").classList.remove("active");
  }

  window.onload = initArchive;
</script>
</body>
</html>
