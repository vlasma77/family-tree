<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Исторический Архив Документов</title>
  <style>
    :root {
      --bg-main: #d6d3d1;
      --bg-card: #e8dcbf;
      --bg-item: #f5f5f4;
      --border-color: #856f49;
      --text-main: #1c1917;
      --link-color: #7c2d12;
    }

    body {
      font-family: 'Georgia', serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      padding: 20px;
      margin: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .archive-container {
      max-width: 1200px;
      margin: 0 auto;
      background-color: var(--bg-card);
      border: 2px solid var(--border-color);
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    h1 {
      font-family: sans-serif;
      font-size: 24px;
      color: #292524;
      border-bottom: 1px solid #a8a29e;
      padding-bottom: 12px;
      margin-bottom: 25px;
    }

    /* Профессиональная адаптивная сетка (Mobile First) */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 16px;
    }

    @media (min-width: 600px) {
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 20px;
      }
    }

    .doc-card {
      background: var(--bg-item);
      border: 1px solid #a8a29e;
      padding: 10px;
      border-radius: 6px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .doc-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.1);
    }

    .img-wrapper {
      width: 100%;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e7e5e4;
      overflow: hidden;
      border-radius: 4px;
      border: 1px solid #d6d3d1;
      cursor: pointer;
    }

    @media (min-width: 600px) {
      .img-wrapper { height: 210px; }
    }

    .img-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* Красивое заполнение карточки */
    }

    .doc-title {
      font-size: 12px;
      margin-top: 8px;
      font-weight: 600;
      color: #444;
      word-break: break-word;
      line-height: 1.3;
    }

    @media (min-width: 600px) {
      .doc-title { font-size: 13px; margin-top: 10px; }
    }

    .no-docs {
      grid-column: 1 / -1;
      text-align: center;
      font-style: italic;
      color: #78716c;
      padding: 50px 20px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      margin-bottom: 20px;
      color: var(--link-color);
      text-decoration: none;
      font-size: 14px;
      font-weight: bold;
    }

    .back-link:hover { text-decoration: underline; }

    /* Высокопроизводительное модальное окно галереи */
    .lightbox {
      display: none;
      position: fixed;
      z-index: 10000;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(12, 10, 9, 0.95);
      align-items: center;
      justify-content: center;
    }
    
    .lightbox.active { display: flex; }
    
    .lightbox img {
      max-width: 95%;
      max-height: 85%;
      object-fit: contain;
      box-shadow: 0 0 30px rgba(0,0,0,0.6);
      border-radius: 4px;
    }

    .lightbox-close {
      position: absolute;
      top: 15px; right: 20px;
      color: #e7e5e4; font-size: 36px;
      cursor: pointer; user-select: none;
      padding: 10px;
      z-index: 10002; /* Поднимаем крестик над самой картинкой */
      pointer-events: auto; /* Принудительно разрешаем клики мыши */
    }

    /* ВОТ СЮДА МЫ ДОВАВИЛИ СТИЛЬ ДЛЯ КОНТЕЙНЕРА PDF */
    #lightbox-content {
      width: 90%;
      max-width: 1000px;
      height: 85vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>
  <script src="../database.js"></script>
</head>
<body>

<div class="archive-container">
  <a href="../index.html" class="back-link">← Вернуться к Семейному Дереву</a>
  <h1 id="archive-header">Архивные документы</h1>
  <div class="grid" id="archive-grid"></div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">&times;</span>
  <div id="lightbox-content" onclick="event.stopPropagation()"></div>
</div>

<script>
  function getQueryParam(param) {
    return new URLSearchParams(window.location.search).get(param);
  }

  function initArchive() {
    const id = getQueryParam("id");
    const grid = document.getElementById("archive-grid");
    const header = document.getElementById("archive-header");
    const db = window.db || window.database;

    if (!id || !db || !db[id]) {
      grid.innerHTML = `<div class="no-docs">Указанный родственник не найден в базе данных.</div>`;
      return;
    }

    const person = db[id];
    if (person.name && person.name.ru) {
      header.innerText = `Архивные документы — ${person.name.ru}`;
    }

    let docs = person.documents || [];

    // Резервный вариант: если документов нет, но есть главное фото, показываем его
    if (docs.length === 0 && person.mainPhoto && person.mainPhoto.trim() !== "") {
      const photoPath = person.mainPhoto.startsWith("../") ? person.mainPhoto : "../" + person.mainPhoto;
      docs = [{ url: photoPath, title: { ru: "Портрет из карточки", en: "Main Photo" } }];
    }

    if (docs.length === 0) {
      grid.innerHTML = `<div class="no-docs">В архиве этой персоны файлы пока отсутствуют.</div>`;
      return;
    }

    grid.innerHTML = "";

    docs.forEach(item => {
      const card = document.createElement("div");
      card.className = "doc-card";
      
      const fileName = item.url || item.file;
      if (!fileName) return;

      // Умный расчет путей с выходом на уровень вверх из подпапки
      let fullPath = "";
      if (fileName.startsWith("../") || fileName.includes("/")) {
        fullPath = fileName.startsWith("../") ? fileName : "../" + fileName;
      } else {
        const folder = person.archive || id;
        fullPath = `../documents/${folder}/${fileName}`;
      }
      
      const displayTitle = (item.title && item.title.ru) ? item.title.ru : (typeof item.title === 'string' ? item.title : "Документ");

      // Для PDF сразу используем стандартную заглушку, чтобы избежать моргания
      const isPDF = fileName.toLowerCase().endsWith('.pdf');
      const previewSrc = isPDF ? '../photos/default.jpg' : fullPath;
     if (isPDF) {
        // Если это PDF, вместо картинки рисуем красивую текстовую плашку "PDF Буклет"
        card.innerHTML = `
          <div class="img-wrapper" onclick="openLightbox('${fullPath}')" style="background: #b91c1c; color: #fff; font-family: sans-serif; font-weight: bold; font-size: 28px; letter-spacing: 2px;">
            PDF
          </div>
          <div class="doc-title">${displayTitle}</div>
        `;
      } else {
        // Если это обычное фото, оставляем стандартный вывод картинки
        card.innerHTML = `
          <div class="img-wrapper" onclick="openLightbox('${fullPath}')">
            <img src="${fullPath}" alt="${displayTitle}" loading="lazy" onerror="this.src='../photos/default.jpg';">
          </div>
          <div class="doc-title">${displayTitle}</div>
        `;
      }
      grid.appendChild(card);
    });
  }

  function openLightbox(src) {
    // Если это PDF-буклет, просто открываем его в новой вкладке браузера
    if (src.toLowerCase().endsWith('.pdf')) {
      window.open(src, '_blank');
      return; // Выходим из функции, модальное окно не открываем
    }
    
    // Для обычных картинок оставляем стандартное модальное окно
    const container = document.getElementById("lightbox-content");
    container.innerHTML = `<img src="${src}" alt="Просмотр документа" style="max-width: 100%; max-height: 100%; object-fit: contain;">`;
    document.getElementById("lightbox").classList.add("active");
  } // Это закрывающая скобка функции openLightbox на строке 278

function closeLightbox() {
  const lightbox = document.getElementById("lightbox");
  const container = document.getElementById("lightbox-content");
  if (lightbox) lightbox.classList.remove("active");
  if (container) container.innerHTML = "";
}

window.onload = initArchive;
</script>
</body>
</html>
