<!DOCTYPE html>
<html lang="ru">
<head>

      color: #1c1917; 
      padding: 20px;
    }
    
    .container {
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
    }

    header {
      border-bottom: 1px solid #a8a29e;
      padding-bottom: 15px;
      margin-bottom: 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .font-historical {
      font-family: 'Oranienbaum', serif;
      font-size: 32px;
      text-align: center;
      width: 100%;
      color: #292524;
      letter-spacing: 0.05em;
    }

    .bg-vintage-paper {
      background-color: #e8dcbf;
      border: 2px solid #856f49;
      border-radius: 6px;
      padding: 20px;
      margin-bottom: 25px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      position: relative;
    }

    #tree-viewport {
      width: 100%;
      height: 600px; 
      position: relative;
      background-color: #f5f5f4;
      border: 1px solid #a8a29e;
      border-radius: 4px;
      overflow: hidden;
    }

    #family-tree {
      width: 100%;
      height: 100%;
    }

    main {
      background-color: #e8dcbf;
      border: 1px solid #856f49;
      border-radius: 8px;
      padding: 20px;
      display: flex;
      gap: 25px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    .hidden { display: none !important; }

    .profile-left {
      width: 25%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .photo-frame {
      background: #f5f5f4;
      padding: 10px;
      border: 1px solid #a8a29e;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 160px;
      position: relative;
    }
    .photo-frame img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
    }
    .mourning-ribbon::before {
      content: "";
      position: absolute;
      top: 8px; left: -15px;
      width: 60px; height: 10px;
      background-color: #000;
      transform: rotate(-45deg);
      z-index: 10;
    }

    .profile-right {
      width: 75%;
      position: relative;
    }
    .close-btn {
      position: absolute;
      top: 0; right: 0;
      font-size: 24px;
      background: none;
      border: none;
      cursor: pointer;
      color: #78716c;
    }
    .role-badge {
      font-size: 11px;
      text-transform: uppercase;
      font-weight: bold;
      color: #9a3412;
      letter-spacing: 0.1em;
    }
    h2 { font-family: 'Playfair Display', serif; font-size: 24px; margin: 4px 0; }
    .years-text { font-family: monospace; color: #444; margin-bottom: 10px; }
    
    hr { border: 0; border-top: 1px solid #a8a29e; margin: 10px 0; }
    
    .section-title { font-size: 11px; text-transform: uppercase; color: #78716c; font-weight: bold; margin-bottom: 5px; }
    
    table { width: 100%; font-size: 13px; border-collapse: collapse; margin-bottom: 10px; }
    td { padding: 4px 0; }
    .td-label { font-weight: bold; color: #57534e; width: 30%; }

    .bio-text { font-size: 13px; line-height: 1.5; margin: 10px 0; }
    .family-list { list-style-position: inside; font-size: 13px; color: #444; }

    .archive-btn {
      display: inline-block;
      background-color: #451a03;
      color: white;
      border: none;
      padding: 8px 15px;
      font-size: 12px;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 15px;
      text-decoration: none;
      font-family: sans-serif;
    }
    .archive-btn:hover { background-color: #78350f; }

    .lang-switcher button {
      padding: 4px 10px;
      border: 1px solid #a8a29e;
      background: #f5f5f4;
      cursor: pointer;
      border-radius: 4px;
    }
    .lang-switcher .active {

      color: white;

    </div>

    <div class="profile-right">

        <p id="person-years" class="years-text"></p>
        
        <hr>
        <div id="milestones-title" class="section-title">Важные вехи</div>
        <table id="milestones-table"></table>
        
        <hr>
        <div id="person-bio" class="bio-text"></div>
        
        <div id="family-title" class="section-title">Семейный круг</div>
        <ul id="family-list" class="family-list"></ul>

        <div id="archive-container"></div>
    </div>
  </main>
</div>

  function renderProfile() {
    const person = db[currentId];
    if (!person) return;

    document.getElementById('profile-card').classList.remove('hidden');
    let photoUrl = getPhotoUrl(currentId);

    document.getElementById("person-photo").src = photoUrl;
    document.getElementById("photo-ribbon").className = person.isDeceased ? "mourning-ribbon" : "";
    document.getElementById("person-role").innerText = (person.role && person.role[currentLang]) || "";
    document.getElementById("person-name").innerText = person.name[currentLang] || person.name['ru'];
    document.getElementById("person-years").innerText = person.years || "";
    
    document.getElementById("milestones-title").innerText = labels[currentLang].m_title;
    document.getElementById("family-title").innerText = labels[currentLang].fam_title;

    const ms = person.milestones || {};
    document.getElementById("milestones-table").innerHTML = `
      <tr><td class="td-label">${labels[currentLang].birth}:</td><td>${ms.birthPlace ? ms.birthPlace[currentLang] : "—"}</td></tr>
      <tr><td class="td-label">${labels[currentLang].marriage}:</td><td>${ms.marriage ? ms.marriage[currentLang] : "—"}</td></tr>
      <tr><td class="td-label">${labels[currentLang].job}:</td><td>${ms.occupation ? ms.occupation[currentLang] : "—"}</td></tr>
      <tr><td class="td-label">${labels[currentLang].burial}:</td><td>${ms.burial ? ms.burial[currentLang] : "—"}</td></tr>
    `;

    document.getElementById("person-bio").innerHTML = (person.bio && person.bio[currentLang]) || "";

    const fList = document.getElementById("family-list");
    fList.innerHTML = "";
    if (person.familyText && person.familyText[currentLang]) {
      person.familyText[currentLang].forEach(t => {
        let li = document.createElement("li");
        li.innerText = t;
        fList.appendChild(li);
      });
    }

    const archiveContainer = document.getElementById("archive-container");
    archiveContainer.innerHTML = "";
    
    if (currentId === "person_vulf_1898" || currentId === "person_blyuma_1895" || currentId === "person_efim_1919" || currentId === "person_mikhail_1922" || currentId === "person_anatoly_1937") {
      let btn = document.createElement("a");
      btn.className = "archive-btn";
      btn.href = `documents/archive.html?id=${currentId}`;
      btn.target = "_blank"; 
      btn.onclick = function(e) { e.stopPropagation(); };
      btn.innerText = labels[currentLang].doc_btn;
      archiveContainer.appendChild(btn);
    }
  } 

  function getTreeData() {
    const generationOrder = [
      "person_iosel_1760",
      "person_volka_1792", "person_feyga_1794",
      "person_shneur_1821", "person_slava_1822",
      "person_shevel_1848", "person_khaya_1860",
      "person_vulf_1898", "person_blyuma_1895",
      "person_efim_1919",
      "person_mikhail_1922",
      "person_anatoly_1937"
    ];

    const treeData = [];
    generationOrder.forEach(id => {
      const person = db[id];
      if (!person) return;

      let photoUrl = getPhotoUrl(id);
      const node = {
        id: id,
        name: person.name[currentLang] || person.name['ru'],
        title: person.years || "",
        img: photoUrl
      };

      if (person.links) {
        if (person.links.spouse) node.pids = [person.links.spouse];
        if (person.links.parents) {
          if (person.links.parents[0]) node.fid = person.links.parents[0];
          if (person.links.parents[1]) node.mid = person.links.parents[1];
        }
      }
      treeData.push(node);
    });
    return treeData;
  }

  let treeInstance = null;
  function drawTree() {
    const container = document.getElementById("family-tree");
    if (!container) return;
    container.innerHTML = "";

    try {
      treeInstance = new FamilyTree(container, {
        mouseScroller: { zoom: true, scale: true },
        nodeBinding: { field_0: "name", field_1: "title", img_0: "img" }
      });

      treeInstance.on('click', function (sender, args) {
        currentId = args.node.id;
        renderProfile();
        return false;
      });

      treeInstance.load(getTreeData());
    } catch (e) {
      console.error("Ошибка инициализации дерева:", e);
    }
  }

  function setLanguage(lang) {
    currentLang = lang;
    document.getElementById("btn-ru").className = lang === 'ru' ? 'active' : '';
    document.getElementById("btn-en").className = lang === 'en' ? 'active' : '';
    document.getElementById("main-title").innerText = lang === 'ru' ? '❦ Летопись поколений рода Смагаринских ❦' : '❦ The Smagarinsky Family Chronicle ❦';
    
    renderProfile();
    drawTree(); 
  }

  setLanguage('ru');
</script>
</body>
</html>
