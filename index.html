  <!-- Подключение библиотеки FamilyTree -->
  <script src="https://balkan.app/js/FamilyTree.js"></script>
  
  <style>
    body { font-family: sans-serif; margin: 20px; background-color: #fcfaf2; }
    .hidden { display: none; }
    .active { font-weight: bold; color: maroon; }
    
    /* Контейнер элементов */
    #main-container { display: flex; flex-direction: column; gap: 20px; }
    
    /* Древо занимает всю ширину экрана */
    #family-tree { width: 100%; height: 600px; border: 1px solid #ccc; background: #fff; }
    
    /* Ограничиваем размер карточки и центрируем её */
    #profile-card { 
      max-width: 800px; 
      width: 100%;
      margin: 0 auto; 
      border: 1px solid #aaa; 
      padding: 20px; 
      background: #fff; 
      box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
      box-sizing: border-box;
    }
    
    /* Контейнер для фото, чтобы позиционировать ленточку в углу */
    #photo-container { 
      position: relative; 
      display: inline-block; 
      margin-bottom: 15px; 
    }
    
    /* Ограничиваем размер фотографии */
    #person-photo { max-width: 150px; width: 100%; display: block; }
    
    /* Стиль черной ленточки в углу */
    .ribbon {
      position: absolute;
      top: 0;
      left: 0;
      width: 35px;
      height: 35px;
      background: linear-gradient(135deg, black 0%, black 40%, transparent 40%, transparent 100%);
      pointer-events: none; /* Чтобы ленточка не мешала кликать на фото */
    }
    
    .td-label { font-weight: bold; padding-right: 15px; color: #555; vertical-align: top; }
    #milestones-table td { padding: 4px 0; }
    
    .archive-btn { display: inline-block; margin-top: 15px; padding: 8px 12px; background: maroon; color: white; text-decoration: none; border-radius: 4px; }
  </style>
</head>

    function renderProfile() {
      const person = db[currentId];
      if (!person) return;

      document.getElementById('profile-card').classList.remove('hidden');
      let photoUrl = getPhotoUrl(currentId);

      const imgEl = document.getElementById("person-photo");
      const ribbonEl = document.getElementById("photo-ribbon");
      
      imgEl.src = photoUrl;
      
      // Если человек умер, включаем черную ленточку в углу
      if (person.isDeceased) {
        ribbonEl.className = "ribbon";
      } else {
        ribbonEl.className = "";
      }

      document.getElementById("person-role").innerText = (person.role && person.role[currentLang]) || "";
      document.getElementById("person-name").innerText = person.name[currentLang] || person.name['ru'];
      document.getElementById("person-years").innerText = person.years || "";
      
      document.getElementById("milestones-title").innerText = labels[currentLang].m_title;
      document.getElementById("family-title").innerText = labels[currentLang].fam_title;

      const ms = person.milestones || {};
      document.getElementById("milestones-table").innerHTML = `
        <tr><td class="td-label">${labels[currentLang].birth}:</td><td>${ms.birthPlace ? (ms.birthPlace[currentLang] || ms.birthPlace['ru']) : "—"}</td></tr>
        <tr><td class="td-label">${labels[currentLang].marriage}:</td><td>${ms.marriage ? (ms.marriage[currentLang] || ms.marriage['ru']) : "—"}</td></tr>
        <tr><td class="td-label">${labels[currentLang].job}:</td><td>${ms.occupation ? (ms.occupation[currentLang] || ms.occupation['ru']) : "—"}</td></tr>
        <tr><td class="td-label">${labels[currentLang].burial}:</td><td>${ms.burial ? (ms.burial[currentLang] || ms.burial['ru']) : "—"}</td></tr>
      `;

      document.getElementById("person-bio").innerHTML = (person.bio && person.bio[currentLang]) || "";

      const fList = document.getElementById("family-list");
      fList.innerHTML = "";
      if (person.familyText && person.familyText[currentLang]) {
        person.familyText[currentLang].forEach(t => {
          let li = document.createElement("li");
          li.innerText = t;
          fList.appendChild(li);
        });
      }

      const archiveContainer = document.getElementById("archive-container");
      archiveContainer.innerHTML = "";
      
      if (person.archive) {
        let btn = document.createElement("a");
        btn.className = "archive-btn";
        btn.href = `documents/archive.html?id=${person.archive}`;
        btn.target = "_blank"; 
        btn.onclick = function(e) { e.stopPropagation(); };
        btn.innerText = labels[currentLang].doc_btn;
        archiveContainer.appendChild(btn);
      }
    } 

    function getTreeData() {
      const generationOrder = [
        "person_iosel_1760", "person_volka_1792", "person_feyga_1794",
        "person_shneur_1821", "person_slava_1822", "person_shevel_1848", "person_khaya_1860",
        "person_vulf_1898", "person_blyuma_1895", "person_efim_1919",
        "person_mikhail_1922", "person_katya_1924", "person_mira_1927", "person_sonya_1929", "person_anatoly_1937"
      ];

      const treeData = [];
      generationOrder.forEach(id => {
        const person = db[id];
        if (!person) return;

        let photoUrl = getPhotoUrl(id);
        const node = {
          id: id,
          name: person.name[currentLang] || person.name['ru'],
          title: person.years || "",
          img: photoUrl
        };

        if (person.links) {
          if (person.links.spouse) node.pids = [person.links.spouse];
          if (person.links.parents) {
            if (person.links.parents[0]) node.fid = person.links.parents[0];
            if (person.links.parents[1]) node.mid = person.links.parents[1];
          }
        }
        treeData.push(node);
      });
      return treeData;
    }

    let treeInstance = null;
    function drawTree() {
      const container = document.getElementById("family-tree");
      if (!container) return;
      container.innerHTML = "";

      try {
        treeInstance = new FamilyTree(container, {
          mouseScroller: { zoom: true, scale: true },
          nodeBinding: { field_0: "name", field_1: "title", img_0: "img" }
        });

        treeInstance.on('click', function (sender, args) {
          currentId = args.node.id;
          renderProfile();
          return false;
        });

        treeInstance.load(getTreeData());
      } catch (e) {
        console.error("Ошибка инициализации дерева:", e);
      }
    }

      document.getElementById("main-title").innerText = lang === 'ru' ? 'Летопись поколений рода Смагаринских' : 'The Smagarinsky Family Chronicle';
      
      renderProfile();
      drawTree(); 
    }

    setLanguage('ru');
