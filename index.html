<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Летопись рода Смагаринских</title>
  
  <script src="https://balkan.app/js/FamilyTree.js"></script>
  <script src="database.js"></script>
  
  <style>
    body { font-family: sans-serif; margin: 20px; background-color: #fcfaf2; }
    .active { font-weight: bold; color: maroon; }
    #family-tree { width: 100%; height: 750px; border: 1px solid #ccc; background: #fff; }
    
    /* СТИЛИЗАЦИЯ НАШИХ КАСТОМНЫХ ЭЛЕМЕНТОВ ВНУТРИ БОКОВОЙ ПАНЕЛИ BALKAN */
    .custom-edit-container { padding: 10px 0; font-family: sans-serif; color: #333; }
    .custom-title { font-weight: bold; margin-top: 15px; margin-bottom: 5px; color: maroon; border-bottom: 1px solid #ddd; padding-bottom: 3px; }
    
    .milestones-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; font-size: 13px; }
    .milestones-table td { padding: 5px 0; vertical-align: top; }
    .td-lbl { font-weight: bold; color: #666; width: 40%; }
    
    /* Кнопки управления */
    .btn-row { display: flex; gap: 8px; margin-top: 15px; margin-bottom: 15px; flex-wrap: wrap; }
    .action-btn { 
      display: inline-flex; align-items: center; justify-content: center; gap: 5px;
      padding: 8px 12px; font-size: 13px; border-radius: 4px; border: 1px solid #ccc;
      background: #fdfdfd; cursor: pointer; text-decoration: none; color: #333; transition: all 0.2s;
    }
    .action-btn:hover { background: #f0f0f0; border-color: #999; }
    .btn-archive { background: maroon !important; color: white !important; border: none; font-weight: bold; }
    .btn-archive:hover { background: #600000 !important; }
    
    /* Раздел расширенной информации */
    .bio-panel { background: #fdfbf7; border: 1px dashed #d1c7bd; padding: 10px; border-radius: 4px; margin-top: 10px; font-size: 13px; line-height: 1.4; }
    .hidden-block { display: none; }
    .family-list { margin: 5px 0 0 0; padding-left: 18px; }
  </style>
</head>
<body>

  <h1 id="main-title">Летопись поколений рода Смагаринских</h1>
  
  <div style="margin-bottom: 20px;">
    <button id="btn-ru" onclick="setLanguage('ru')">RU</button>
    <button id="btn-en" onclick="setLanguage('en')">EN</button>
  </div>

  <div id="family-tree"></div>

  <script>
    let currentLang = "ru";
    const db = window.db || {};

    if (typeof FamilyTree !== 'undefined') {
      FamilyTree.anim.shop = false; 
      FamilyTree.SearchFields = ["name"];
    }

    // Автоматическое определение заглушек для фото
    function getPhotoUrl(id) {
      const person = db[id];
      if (person && person.mainPhoto) {
        return person.mainPhoto.startsWith("photos/") ? person.mainPhoto : "photos/" + person.mainPhoto;
      }
      let isFemale = id.includes("blyuma") || id.includes("haya") || id.includes("khaya") || id.includes("feyga") || id.includes("slava") || id.includes("katya") || id.includes("mira") || id.includes("sonya") || id.includes("nadezhda");
      return isFemale ? "photos/female.jpg" : "photos/male.jpg";
    }

    // Словари перевода для интерфейса боковой панели
    const labels = {
      ru: {
        birth: "Место рождения", marriage: "Брак", job: "Род занятий", burial: "Место упокоения",
        btn_doc: "📂 Архивные документы", btn_add: "➕ Добавить", btn_edit: "✏️ Править", btn_more: "ℹ️ Подробнее",
        vehi: "Важные вехи", circle: "Семейный круг", bio: "Биография"
      },
      en: {
        birth: "Birth Place", marriage: "Marriage", job: "Occupation", burial: "Burial Place",
        btn_doc: "📂 Documents", btn_add: "➕ Add Relative", btn_edit: "✏️ Edit", btn_more: "ℹ️ More Info",
        vehi: "Key Milestones", circle: "Family Circle", bio: "Biography"
      }
    };

    // ФУНКЦИЯ СБОРКИ КАСТОМНОГО ИНТЕРФЕЙСА ДЛЯ БОКОВОЙ ПАНЕЛИ БАЛКАНА
    function generateEditFormHtml(obj) {
      const id = obj.id;
      const person = db[id];
      if (!person) return `<div style="padding:15px;">Запись не найдена в database.js</div>`;

      const ms = person.milestones || {};
      const bText = labels[currentLang];

      // Проверка наличия архива
      let archiveHtml = "";
      if (person.archive) {
        archiveHtml = `<a class="action-btn btn-archive" href="documents/archive.html?id=${person.archive}" target="_blank">${bText.btn_doc}</a>`;
      }

      // Сборка списка родственников
      let familyLiItems = "";
      if (person.familyText && person.familyText[currentLang]) {
        person.familyText[currentLang].forEach(text => {
          familyLiItems += `<li>${text}</li>`;
        });
      }

      const bioContent = person.bio ? (person.bio[currentLang] || "") : "";

      // Формируем результирующий HTML-шаблон внутри панели
      return `
        <div class="custom-edit-container">
          <div class="custom-title">${bText.vehi}</div>
          <table class="milestones-table">
            <tr><td class="td-lbl">${bText.birth}:</td><td>${ms.birthPlace ? (ms.birthPlace[currentLang] || ms.birthPlace['ru']) : "—"}</td></tr>
            <tr><td class="td-lbl">${bText.marriage}:</td><td>${ms.marriage ? (ms.marriage[currentLang] || ms.marriage['ru']) : "—"}</td></tr>
            <tr><td class="td-lbl">${bText.job}:</td><td>${ms.occupation ? (ms.occupation[currentLang] || ms.occupation['ru']) : "—"}</td></tr>
            <tr><td class="td-lbl">${bText.burial}:</td><td>${ms.burial ? (ms.burial[currentLang] || ms.burial['ru']) : "—"}</td></tr>
          </table>

          <div class="btn-row">
            ${archiveHtml}
            <button class="action-btn" onclick="alert('Добавить родственника для: ${person.name.ru}')">${bText.btn_add}</button>
            <button class="action-btn" onclick="alert('Редактировать данные: ${person.name.ru}')">${bText.btn_edit}</button>
            <button class="action-btn" onclick="toggleBioBlock()">${bText.btn_more}</button>
          </div>

          <div id="extended-bio-panel" class="bio-panel hidden-block">
            <div style="font-weight:bold; margin-bottom:5px; color:maroon;">${bText.bio}:</div>
            <div>${bioContent || "—"}</div>
            
            <div style="font-weight:bold; margin-top:10px; margin-bottom:5px; color:maroon;">${bText.circle}:</div>
            <ul class="family-list">${familyLiItems || "—"}</ul>
          </div>
        </div>
      `;
    }

    // Функция-переключатель видимости дополнительной информации
    window.toggleBioBlock = function() {
      const panel = document.getElementById("extended-bio-panel");
      if (panel) {
        panel.classList.toggle("hidden-block");
      }
    };

    function getTreeData() {
      const treeData = [];
      Object.keys(db).forEach(id => {
        const person = db[id];
        let photoUrl = getPhotoUrl(id);
        const node = {
          id: id,
          name: person.name[currentLang] || person.name['ru'],
          title: person.years || "",
          img: photoUrl
        };

        if (person.links) {
          if (person.links.spouse) node.pids = [person.links.spouse];
          if (person.links.parents) {
            if (person.links.parents[0]) node.fid = person.links.parents[0];
            if (person.links.parents[1]) node.mid = person.links.parents[1];
          }
        }
        treeData.push(node);
      });
      return treeData;
    }

    let treeInstance = null;
    function drawTree() {
      const container = document.getElementById("family-tree");
      if (!container) return;
      container.innerHTML = "";

      try {
        treeInstance = new FamilyTree(container, {
          mouseScroller: { zoom: true, scale: true },
          nodeBinding: { 
            field_0: "name", 
            field_1: "title", 
            img_0: "img"
          },
          // ПОДКЛЮЧАЕМ НАШ КАСТОМНЫЙ ШАБЛОН ДЛЯ ВСТРОЕННОЙ БОКОВОЙ ПАНЕЛИ
          editForm: {
            buttons: {
              pdf: { text: "Сохранить в PDF" } // Оставим системную полезную кнопку PDF
            },
            generateElements: function(elements, nodes, fields) {
              // Очищаем стандартные текстовые инпуты Balkan, чтобы они не дублировались
              return []; 
            },
            // Внедряем наш умный HTML-шаблон внутрь боковой панели
            template: function(obj, fields, node) {
              return generateEditFormHtml(obj);
            }
          }
        });

        treeInstance.load(getTreeData());
      } catch (e) {
        console.error("Ошибка при инициализации дерева:", e);
      }
    }

    function setLanguage(lang) {
      currentLang = lang;
      document.getElementById("btn-ru").className = lang === 'ru' ? 'active' : '';
      document.getElementById("btn-en").className = lang === 'en' ? 'active' : '';
      document.getElementById("main-title").innerText = lang === 'ru' ? 'Летопись поколений рода Смагаринских' : 'The Smagarinsky Family Chronicle';
      drawTree(); 
    }

    setLanguage('ru');
  </script>
</body>
</html>
