<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Семейный Архив Смагаринских</title>
  
  <script src="https://balkan.app/js/FamilyTree.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oranienbaum&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Georgia', serif; 
      background-color: #d6d3d1; 
      color: #1c1917; 
      padding: 20px;
    }
    
    .container {
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
    }

    header {
      border-bottom: 1px solid #a8a29e;
      padding-bottom: 15px;
      margin-bottom: 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .font-historical {
      font-family: 'Oranienbaum', serif;
      font-size: 32px;
      text-align: center;
      width: 100%;
      color: #292524;
      letter-spacing: 0.05em;
    }

    .bg-vintage-paper {
      background-color: #e8dcbf;
      border: 2px solid #856f49;
      border-radius: 6px;
      padding: 20px;
      margin-bottom: 25px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      position: relative;
    }

    #tree-viewport {
      width: 100%;
      height: 600px; 
      position: relative;
      background-color: #f5f5f4;
      border: 1px solid #a8a29e;
      border-radius: 4px;
      overflow: hidden;
    }

    #family-tree {
      width: 100%;
      height: 100%;
    }

    .search-box {
      max-width: 350px;
      margin: 0 auto 15px auto;
      position: relative;
      z-index: 100;
    }
    .search-box input {
      width: 100%;
      padding: 10px 15px;
      border: 1px solid #a8a29e;
      border-radius: 8px;
      font-size: 14px;
      font-family: serif;
    }
    #search-results {
      position: absolute;
      left: 0; right: 0; top: 100%;
      background: white;
      border: 1px solid #d6d3d1;
      border-radius: 4px;
      max-height: 200px;
      overflow-y: auto;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      display: none;
      z-index: 999;
    }
    .search-item {
      padding: 8px 12px;
      cursor: pointer;
      border-bottom: 1px solid #f5f5f4;
      font-size: 14px;
    }
    .search-item:hover { background-color: #fef3c7; }

    main {
      background-color: #e8dcbf;
      border: 1px solid #856f49;
      border-radius: 8px;
      padding: 20px;
      display: flex;
      gap: 25px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    .hidden { display: none !important; }

    .profile-left {
      width: 25%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .photo-frame {
      background: #f5f5f4;
      padding: 10px;
      border: 1px solid #a8a29e;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 160px;
      position: relative;
    }
    .photo-frame img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
    }
    .mourning-ribbon::before {
      content: "";
      position: absolute;
      top: 8px; left: -15px;
      width: 60px; height: 10px;
      background-color: #000;
      transform: rotate(-45deg);
      z-index: 10;
    }

    .profile-right {
      width: 75%;
      position: relative;
    }
    .close-btn {
      position: absolute;
      top: 0; right: 0;
      font-size: 24px;
      background: none;
      border: none;
      cursor: pointer;
      color: #78716c;
    }
    .role-badge {
      font-size: 11px;
      text-transform: uppercase;
      font-weight: bold;
      color: #9a3412;
      letter-spacing: 0.1em;
    }
    h2 { font-family: 'Playfair Display', serif; font-size: 24px; margin: 4px 0; }
    .years-text { font-family: monospace; color: #444; margin-bottom: 10px; }
    
    hr { border: 0; border-top: 1px solid #a8a29e; margin: 10px 0; }
    
    .section-title { font-size: 11px; text-transform: uppercase; color: #78716c; font-weight: bold; margin-bottom: 5px; }
    
    table { width: 100%; font-size: 13px; border-collapse: collapse; margin-bottom: 10px; }
    td { padding: 4px 0; }
    .td-label { font-weight: bold; color: #57534e; width: 30%; }

    .bio-text { font-size: 13px; line-height: 1.5; margin: 10px 0; }
    .family-list { list-style-position: inside; font-size: 13px; color: #444; }

    .archive-btn {
      display: inline-block;
      background-color: #451a03;
      color: white;
      border: none;
      padding: 8px 15px;
      font-size: 12px;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 15px;
      text-decoration: none;
      font-family: sans-serif;
    }
    .archive-btn:hover { background-color: #78350f; }

    .lang-switcher button {
      padding: 4px 10px;
      border: 1px solid #a8a29e;
      background: #f5f5f4;
      cursor: pointer;
      border-radius: 4px;
    }
    .lang-switcher .active {
      background: #292524;
      color: white;
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1 id="main-title" class="font-historical">❦ Летопись поколений рода Смагаринских ❦</h1>
    <div class="lang-switcher">
      <button onclick="setLanguage('ru')" id="btn-ru" class="active">RU</button>
      <button onclick="setLanguage('en')" id="btn-en">EN</button>
    </div>
  </header>

  <section class="bg-vintage-paper">
    <div class="search-box">
      <input type="text" id="tree-search" placeholder="Поиск предка (например, Вульф)...">
      <div id="search-results"></div>
    </div> 

    <div id="tree-viewport">
       <div id="family-tree"></div>
    </div>
  </section>

  <main id="profile-card">
    <div class="profile-left">
      <div class="photo-frame">
        <div id="photo-ribbon"></div>
        <img id="person-photo" src="" alt="Портрет">
        <p id="photo-caption" style="font-size:11px; text-align:center; margin-top:5px; font-style:italic;"></p>
      </div>
    </div>

    <div class="profile-right">
        <button class="close-btn" onclick="document.getElementById('profile-card').classList.add('hidden')">&times;</button>
        <span id="person-role" class="role-badge"></span>
        <h2 id="person-name"></h2>
        <p id="person-years" class="years-text"></p>
        
        <hr>
        <div id="milestones-title" class="section-title">Важные вехи</div>
        <table id="milestones-table"></table>
        
        <hr>
        <div id="person-bio" class="bio-text"></div>
        
        <div id="family-title" class="section-title">Семейный круг</div>
        <ul id="family-list" class="family-list"></ul>

        <div id="archive-container"></div>
    </div>
  </main>
</div>

<script>
  let currentId = "person_vulf_1898";
  let currentLang = "ru";

  // Функция для автоматического определения фото по ID человека
  function getPhotoUrl(id) {
    const person = db[id];
    
    // Если в db явно прописано фото (как у Вульфа), используем его
    if (person && person.photo) {
      return person.photo;
    }
    
    // Иначе пробуем найти по схеме имяГод.jpg (из папки photos)
    const namePart = id.replace("person_", ""); // убираем префикс, получаем например 'blyuma_1895' или 'efim_1919'
    const cleanName = namePart.replace("_", ""); // убираем подчеркивание, получаем 'blyuma1895' или 'efim1919'
    
    // Список файлов, которые точно есть у вас в папке photos
    const existingPhotos = [
      "anatoly1937.jpg", "blyuma1895.jpg", "efim1919.jpg", 
      "katya1924.jpg", "mikhail1922.jpg", "mira1927.jpg", 
      "sonya1929.jpg", "vulf1898.jpg"
    ];
    
    const targetFile = cleanName + ".jpg";
    if (existingPhotos.includes(targetFile)) {
      return "photos/" + targetFile;
    }
    
    // Если персональной фотки нет, выдаем стандартный ретро-силуэт
    let isFemale = id.includes("blyuma") || id.includes("haya") || id.includes("khaya") || id.includes("feyga") || id.includes("slava") || id.includes("katya") || id.includes("mira") || id.includes("sonya");
    return isFemale ? "photos/female.jpg" : "photos/male.jpg";
  }

  const db = {
    "person_vulf_1898": {
      "name": { "ru": "Вульф Смагаринский", "en": "Vulf Smagarinsky" },
      "role": { "ru": "Глава Рода / Сапожник", "en": "Head of Family / Shoemaker" },
      "years": "1898 – 1975",
      "isDeceased": true,
      "photo": "photos/vulf1898.jpg", // Перенаправили на красивую аватарку
      "milestones": {
        "birthPlace": { "ru": "Прилуки, Черниговская губ.", "en": "Priluki, Chernigov province" },
        "marriage": { "ru": "Блюма Смагаринская (1916 г.)", "en": "Blyuma Smagarinskaya (1916)" },
        "occupation": { "ru": "Мастер обувного дела, артель сапожников", "en": "Shoemaker master" },
        "burial": { "ru": "Еврейское кладбище, Астрахань", "en": "Jewish cemetery, Astrakhan" }
      },
      "bio": { "ru": "<p>Основатель биробиджанской ветви семьи, выдающийся мастер своего дела...</p>" },
      "familyText": { "ru": ["Супруга: Блюма Самуилова", "Дети: Ефим"] },
      "links": { "spouse": "person_blyuma_1895", "parents": ["person_shevel_1848", "person_khaya_1860"] }
    },
    "person_blyuma_1895": {
      "name": { "ru": "Блюма Самуилова Смагаринская", "en": "Blyuma Smagarinskaya" },
      "role": { "ru": "Хранительница очага", "en": "Keeper of the Hearth" },
      "years": "1895 – 1980",
      "isDeceased": true,
      "photo": "",
      "milestones": { "birthPlace": { "ru": "Киевская губерния", "en": "Kyiv Province" } },
      "bio": { "ru": "<p>Хранительница семейных традиций.</p>" },
      "familyText": { "ru": ["Супруг: Вульф Смагаринский"] },
      "links": { "spouse": "person_vulf_1898" }
    },
    "person_efim_1919": {
      "name": { "ru": "Ефим Смагаринский", "en": "Efim Smagarinsky" },
      "role": { "ru": "Ветеран / Инженер", "en": "Veteran / Engineer" },
      "years": "1919 – 2002",
      "isDeceased": true,
      "photo": "",
      "milestones": { "birthPlace": { "ru": "Биробиджан", "en": "Birobidzhan" } },
      "bio": { "ru": "<p>Ветеран Великой Отечественной войны.</p>" },
      "familyText": { "ru": ["Родители: Вульф и Блюма"] },
      "links": { "parents": ["person_vulf_1898", "person_blyuma_1895"] }
    },
    "person_shevel_1848": {
      "name": { "ru": "Шевель Залманов Смагаринский", "en": "Shevel Smagarinsky" },
      "years": "1848 — 1908", "isDeceased": true,
      "links": { "parents": ["person_shneur_1821", "person_slava_1822"], "spouse": "person_khaya_1860" }
    },
    "person_khaya_1860": {
      "name": { "ru": "Хая Смагаринская (Гуревич)", "en": "Khaya Smagarinskaya" },
      "years": "1860 — ?", "isDeceased": true,
      "links": { "spouse": "person_shevel_1848" }
    },
    "person_shneur_1821": {
      "name": { "ru": "Шнеур Залмон Смагаринский", "en": "Shneur Smagarinsky" },
      "years": "1821 — ?", "isDeceased": true,
      "links": { "parents": ["person_volka_1792", "person_feyga_1794"], "spouse": "person_slava_1822" }
    },
    "person_slava_1822": {
      "name": { "ru": "Слава Смагаринская", "en": "Slava Smagarinskaya" },
      "years": "1822 — 1890", "isDeceased": true,
      "links": { "spouse": "person_shneur_1821" }
    },
    "person_volka_1792": {
      "name": { "ru": "Волька Иосел Смагаринский", "en": "Volka Smagarinsky" },
      "years": "1792 — ?", "isDeceased": true,
      "links": { "parents": ["person_iosel_1760", null], "spouse": "person_feyga_1794" }
    },
    "person_feyga_1794": {
      "name": { "ru": "Фейга Рохля Смагаринская", "en": "Feyga" },
      "years": "1794 — ?", "isDeceased": true,
      "links": { "spouse": "person_volka_1792" }
    },
    "person_iosel_1760": {
      "name": { "ru": "Иосел Смагаринский", "en": "Iosel Smagarinsky" },
      "years": "до 1792 — ?", "isDeceased": true,
      "links": {}
    }
  };

  const labels = {
    ru: { m_title: "Важные вехи", fam_title: "Семейный круг", birth: "Место рождения", marriage: "Брак", job: "Род занятий", burial: "Место упокоения", doc_btn: "Просмотр архивных документов" },
    en: { m_title: "Key Milestones", fam_title: "Family Circle", birth: "Birth Place", marriage: "Marriage", job: "Occupation", burial: "Burial Place", doc_btn: "View Archive Documents" }
  };

  function renderProfile() {
    const person = db[currentId];
    if (!person) return;

    document.getElementById('profile-card').classList.remove('hidden');

    // Получаем путь к картинке через нашу новую умную функцию
    let photoUrl = getPhotoUrl(currentId);

    document.getElementById("person-photo").src = photoUrl;
    document.getElementById("photo-ribbon").className = person.isDeceased ? "mourning-ribbon" : "";
    document.getElementById("person-role").innerText = (person.role && person.role[currentLang]) || "";
    document.getElementById("person-name").innerText = person.name[currentLang] || person.name['ru'];
    document.getElementById("person-years").innerText = person.years || "";
    
    document.getElementById("milestones-title").innerText = labels[currentLang].m_title;
    document.getElementById("family-title").innerText = labels[currentLang].fam_title;

    const ms = person.milestones || {};
    document.getElementById("milestones-table").innerHTML = `
      <tr><td class="td-label">${labels[currentLang].birth}:</td><td>${ms.birthPlace ? ms.birthPlace[currentLang] : "—"}</td></tr>
      <tr><td class="td-label">${labels[currentLang].marriage}:</td><td>${ms.marriage ? ms.marriage[currentLang] : "—"}</td></tr>
      <tr><td class="td-label">${labels[currentLang].job}:</td><td>${ms.occupation ? ms.occupation[currentLang] : "—"}</td></tr>
      <tr><td class="td-label">${labels[currentLang].burial}:</td><td>${ms.burial ? ms.burial[currentLang] : "—"}</td></tr>
    `;

    document.getElementById("person-bio").innerHTML = (person.bio && person.bio[currentLang]) || "";

    const fList = document.getElementById("family-list");
    fList.innerHTML = "";
    if (person.familyText && person.familyText[currentLang]) {
      person.familyText[currentLang].forEach(t => {
        let li = document.createElement("li");
        li.innerText = t;
        fList.appendChild(li);
      });
    }

    const archiveContainer = document.getElementById("archive-container");
    archiveContainer.innerHTML = "";
    
    if (currentId === "person_vulf_1898" || currentId === "person_blyuma_1895" || currentId === "person_efim_1919") {
      let btn = document.createElement("a");
      btn.className = "archive-btn";
      btn.href = `documents/archive.html?id=${currentId}`;
      btn.target = "_blank"; 
      
      btn.onclick = function(e) {
        e.stopPropagation();
      };
      
      btn.innerText = labels[currentLang].doc_btn;
      archiveContainer.appendChild(btn);
    }
  } 

  function getTreeData() {
    const generationOrder = [
      "person_iosel_1760",
      "person_volka_1792", "person_feyga_1794",
      "person_shneur_1821", "person_slava_1822",
      "person_shevel_1848", "person_khaya_1860",
      "person_vulf_1898", "person_blyuma_1895",
      "person_efim_1919"
    ];

    const treeData = [];

    generationOrder.forEach(id => {
      const person = db[id];
      if (!person) return;

      // Получаем автоматический путь к аватарке
      let photoUrl = getPhotoUrl(id);

      const node = {
        id: id,
        name: person.name[currentLang] || person.name['ru'],
        title: person.years || "",
        img: photoUrl // Свойство 'img' необходимо библиотеке Balkan Tree для вывода лиц!
      };

      if (person.links) {
        if (person.links.spouse) {
          node.pids = [person.links.spouse];
        }
        if (person.links.parents) {
          if (person.links.parents[0]) node.fid = person.links.parents[0];
          if (person.links.parents[1]) node.mid = person.links.parents[1];
        }
      }
      treeData.push(node);
    });

    return treeData;
  }

  let treeInstance = null;
  function drawTree() {
    const container = document.getElementById("family-tree");
    if (!container) return;
    container.innerHTML = "";

    try {
      treeInstance = new FamilyTree(container, {
        mouseScroller: { zoom: true, scale: true },
        nodeBinding: { field_0: "name", field_1: "title", img_0: "img" } // Указали брать картинку из поля 'img'
      });

      treeInstance.on('click', function (sender, args) {
        currentId = args.node.id;
        renderProfile();
        return false;
      });

      treeInstance.load(getTreeData());
    } catch (e) {
      console.error("Ошибка инициализации дерева:", e);
    }
  }

  function setLanguage(lang) {
    currentLang = lang;
    document.getElementById("btn-ru").className = lang === 'ru' ? 'active' : '';
    document.getElementById("btn-en").className = lang === 'en' ? 'active' : '';
    document.getElementById("main-title").innerText = lang === 'ru' ? '❦ Летопись поколений рода Смагаринских ❦' : '❦ The Smagarinsky Family Chronicle ❦';
    document.getElementById("tree-search").placeholder = lang === 'ru' ? 'Поиск предка...' : 'Search...';
    renderProfile();
    drawTree();
  }

  document.getElementById("tree-search").addEventListener("input", (e) => {
    const val = e.target.value.toLowerCase().trim();
    const res = document.getElementById("search-results");
    res.innerHTML = "";
    if(!val) { res.style.display = "none"; return; }

    Object.keys(db).forEach(id => {
      let p = db[id];
      if ((p.name.ru && p.name.ru.toLowerCase().includes(val)) || (p.name.en && p.name.en.toLowerCase().includes(val))) {
        let div = document.createElement("div");
        div.className = "search-item";
        div.innerText = p.name[currentLang];
        div.onclick = () => {
          currentId = id;
          renderProfile();
          if (treeInstance) treeInstance.center(id);
          res.style.display = "none";
          document.getElementById("tree-search").value = "";
        };
        res.appendChild(div);
      }
    });
    res.style.display = res.children.length ? "block" : "none";
  });

  setLanguage('ru');
</script>
</body>
</html>
